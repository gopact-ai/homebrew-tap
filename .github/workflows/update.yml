name: formula freshness

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: formula / current
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify latest stable formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag=$(gh api repos/gopact-ai/9a/releases/latest --jq .tag_name)
          version=${tag#v}
          gh release download "$tag" \
            --repo gopact-ai/9a \
            --pattern checksums.txt \
            --dir "$RUNNER_TEMP"
          ./scripts/test-render-formula.sh
          ./scripts/render-formula.sh \
            "$version" "$RUNNER_TEMP/checksums.txt" > "$RUNNER_TEMP/ninea.rb"
          if ! diff -u Formula/ninea.rb "$RUNNER_TEMP/ninea.rb"; then
            printf '%s\n' \
              "Formula is stale. Render version $version and submit it through a pull request." \
              >&2
            exit 1
          fi
